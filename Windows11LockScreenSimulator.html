<!DOCTYPE html>
<html>
<head>
<title>Windows 11 Lock Screen Simulator</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #fcfcfc;
}

* {
    transition: all 0.2s ease;
    -webkit-user-drag: none;
    user-select: none;
}

/* === Layout === */
.container {
    display: grid;
    grid-template-columns: 20% 60% 20%; /* nice clean ratios */
    height: 100vh;
}

/* === Left Table === */
.left-panel {
    background-color: #fafafa;
    border-right: 1px solid #cccccc;
    padding: 1.5vw; /* scales nicely */
}

#usersScroll {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0px 10px;
}


.user-boxes {
    background-color: #e0e0e0;
    border-radius: 1.5vh / 1.5vh;
    height: 8vh; /* instead of 60px */
    text-align: center;
    vertical-align: middle;
}



.cell-button {
    width: 100%;
    height: 100%;

    border: none;
    background: transparent;

    padding: 0;
    margin: 0;

    cursor: pointer;
}
.cell-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10%;
}

.selectedBox {
    transform: scale(1.05);
    background-color: #f0f0f0;
}

.user-boxes:hover {
    transform: scale(1.1);
}

.radio {
    accent-color: blue;
    width: 20px;
    height: 20px;

}

.slider {
    accent-color: blue;
    height: 20px;
    width: 7vw;

}


.username-display {
    width: 40%;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 2vh;
    text-align: left;
}

/* === Circle Images === */
.circle-img {
    width: 3vw;
    height: 3vw;
    min-width: 30px;
    min-height: 30px;
    border-radius: 50%;
}


/* === Main Center === */
.center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}


.main-div {
    position: relative; /* IMPORTANT */
    width: 40vw;
    height: 40vh; /* instead of 300px */
    margin-bottom: 3vh;
    border: 2px solid black;
}

/* === Bottom Row (images + inputs) === */
.bottom-row {
    display: flex;
    justify-content: center;
    gap: 5vw;       /* instead of 40px */
    width: 100%;
    margin: 5vw;    /* clean scaling */
}

.section {
    display: flex;
    flex-direction: column;
    align-items: center;      /* horizontal center */
    justify-content: center;  /* vertical center */
    height: 100%;
}
.low-content {
    margin: 10px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 20px;
}

.min-button {
    border: none;
    background: none;
    color: blue;
    text-decoration: underline;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    word-spacing: -2px;
}

.min-button:hover {
    transform: scale(1.2);
}

@font-face {
  font-family: 'GoogleIcons';
  src: url('https://fonts.gstatic.com/s/materialicons/v142/flUhRq6tzZclQEJ-Vdg-IuiaDsNc.woff2') format('woff2');
  /* ONLY apply this font to the Private Use Area (where icons live) */
  unicode-range: U+E000-F8FF; 
}

#internet-select {
    width: 60%;
    aspect-ratio: 4.5;
    font-family: 'GoogleIcons', 'Arial', sans-serif;
    font-size: 20px;
    vertical-align: middle;
    border-radius: 0.3vw;
    background-color: #eaeaea;
    border-width: 0;
    padding: 0.5vw;
}

option {
    width: 100%;
    height: 100%;
}

/* === Right Output === */
.right-panel {
    background-color: #fafafa;
    border-left: 1px solid #ccc;
    padding: 1.5vw; /* scales nicely */
}

.output-div {
    width: 100%;
    height: 100%;
}

/* === Plus cell === */
.plus {
    font-size: 3vw;
    font-weight: bold;
    color: #303030;
}

.hidden {
    display: none !important;
    pointer-events: none !important;
}

.shadowed {
    box-shadow: 0px 0px 25px -10px #000000;
}



#outputText {
    white-space: pre-wrap;
  font-family: "Lucida Console", Monaco, monospace;
  font-size: 15px;
  letter-spacing: 0px;
  word-spacing: -2px;
  color: #303030;
  font-weight: 400;
}

#background-display {
    height: 15vh;
}

#icon-display {
    width: 6vw;
    height: 6vw;
    min-width: 40px;
    min-height: 40px;
}

#name-input {
    width: 12vw;
    min-width: 120px;
    font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
    font-size: 15px;
    letter-spacing: 0px;
    word-spacing: -2px;
    padding: 3px;
    border-radius: 7px;
    border-style: solid;
    border-color: #303030;
    border-width: 2px
}

#fullscreen-main {
    width: 50px;
    height: 50px;
    background-color: transparent;
    border-width: 0;
    display: grid;
    place-items: center; /* Shorthand for horizontal and vertical centering */
    position: absolute;
    bottom: 10px;
    right: 10px;
    z-index: 999;
}

#fullscreen-main:hover {
    transform: scale(1.2);
}

#fullscreen-image {
    width: 100%;
    aspect-ratio: 1;
}


#loginFrame {
    opacity: 0;
    grid-area: 1 / 1;   /* ✅ same cell = overlays image */
    z-index: 3;
    background-color: transparent;
    justify-self: center;
    align-self: center;
    width: fit-content;
    height: fit-content; /* Optional, as height is 'auto' by default */
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;   /* stack vertically */
    align-items: center;      /* center horizontally (X axis) */
}

#simulation-frame {
    position: absolute;
    inset: 0;

    display: grid;

    overflow: hidden; /* ✅ fixes image spilling out */
}

#simulation-background {
    grid-area: 1 / 1;
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: -2;
    /* We handle transition via opacity on the front image now */
    transition: filter 0.25s ease, transform 0.25s ease; 
}

/* Add this for the secondary background used for crossfading */
#simulation-background-temp {
    grid-area: 1 / 1;
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    z-index: -3; /* Sits behind the main one */
}

#simulation-time {
    grid-area: 1 / 1;   /* ✅ same cell = overlays image */
    
    justify-self: center;
    align-self: start;
    margin-top: 160px;

    font-size: 120px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #FFFFFF;
    font-weight: 600;
    z-index: 1;
    transition: all 0.15s ease;
}

#simulation-date {
    grid-area: 1 / 1;   /* ✅ same cell = overlays image */
    
    justify-self: center;
    align-self: start;
    margin-top: 300px;

    font-size: 30px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #FFFFFF;
    font-weight: 600;
    z-index: 1;
    transition: all 0.15s ease;
}

#simulation-icon {
    border-radius: 50%;
    height: 200px;
    width: 200px;
}

#simulation-name {
    font-size: 30px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #FFFFFF;
    font-weight: 650;
    margin: 15px;
}

#simulation-pin-image {
    width: 40px;
    height: auto;
}

#simulation-think {
    width: 40px;
    height: auto;
}

#simulation-pin-label {
    font-size: 25px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #FFFFFF;
    font-weight: 600;
    margin: 15px;
}

#simulation-input-container {
    position: relative;

    width: 280px;
    height: 26px;
    margin: 10px;

    display: flex;
    justify-content: center; /* centers input */
    align-items: center;

    background-color: transparent;
}

#simulation-input {
    position: relative;

    border-width: 2px;
    border-color: #eeeeee30 #eeeeee30 #eeeeee;
    border-radius: 4.4px;
    border-style: solid;

    background-color: #20202033;
    background-clip: padding-box;

    height: 19px;
    width: 276px;

    font-size: 16px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #fff;

    padding: 7px;
}

#simulation-input::placeholder {
    color: white;
    opacity: 1;
}

#simulation-input:hover {
    background-color: #202020bb;
}

#simulation-input:focus {
    background-color: #202020bb;
    outline: none;
    border-color: #eeeeee30 #eeeeee30 #21aded;
}

#simulation-input.force-active {
    background-color: #202020bb;
    border-color: #eeeeee30 #eeeeee30 #21aded;
}

#simulation-input-buttons {
    width: fit-content;
    height: fit-content;
    position: absolute;
    right: 6px;
    z-index: 2;
    background-color: transparent;
    top: 50%;
    transform: translateY(-50%); /* 👈 centers vertically */
    display: flex;          /* 👈 REQUIRED for gap + order */
    align-items: center;    /* vertical alignment */
    gap: 7px;
}

#simulation-password-input {
    height: 25px;
    width: 32px;
    background-color: transparent;
    border-width: 0;
    border-radius: 3px;

    display: flex;
    justify-content: center; /* Centers horizontally */
    align-items: center;
    cursor: pointer;
}

#simulation-password-input:hover {
    background-color: #21aded;
    #simulation-arrow-image {
        fill: black;
    }
}

#simulation-arrow-image {
    fill: white;
    height: 15px;
}

#simulation-show-input {
    height: 25px;
    width: 30px;
    background-color: transparent;
    border-width: 0;
    border-radius: 3px;
    cursor: pointer;
}

#simulation-show-input:hover {
    background-color: #58585880;
}

#simulation-show-input:active {
    background-color: #68686880;
}

#simulation-show-image {
    width: 15px;
    height: 15px;
    fill: white;
}

#simulation-forgot {
    margin: 20px;

    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 15px;
    color: white;
    font-weight: 450;
    cursor: pointer;
}

#simulation-forgot:hover {
    color: #e9e9e9;
    transition: none;
}

#simulation-hover {
    z-index: 100;
    transform: translateX(-50%);

    color: #fff;
    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 14px;
    font-weight: 500;

    background-color: #434040;
    padding: 6px 8px;
    border-color: black;
    border-width: 1px;
    border-style: groove;

    width: fit-content;
    height: fit-content;

    position: fixed; /* or absolute */
    pointer-events: none; /* prevents blocking mouse */
}

#simulation-wrong {
    margin: 20px;

    font-family: "Segoe UI", Tahoma, sans-serif;
    font-size: 15px;
    color: white;
    font-weight: 450;
}

#simulation-again {
    font-size: 14px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #fff;
    font-weight: 500;

    margin: 10px;
    padding: 4px;
    width: 114px;

    border-radius: 4px;

    background-color: #f0f0f050;
    border-width: 2px;
    border-color: #ffffff00;
    border-style: solid;
    transition: none;
}

#simulation-again:hover {
    border-color: #ffffff99;
}

#simulation-again:active {
    outline: 2.5px solid #fff;
    outline-offset: 1px;
}

#simulation-again.force-active {
    outline: 2.5px solid #fff;
    outline-offset: 1px;
}

#simulation-users {
    width: 170px;
    height: fit-content;
    z-index: 5;

    grid-area: 1/1;
    margin: 25px;
    justify-self: left;
    align-self: end;
    opacity: 0;
}

.simulation-user {
    display: flex;
    align-items: center; /* Centers children vertically */
    width: 100%;
    height: 60px;

    background-color: #bebece00;

    border-width: 0;
    border-radius: 5px;
}

.simulation-user-button {
    display: flex;
    align-items: center; /* Centers children vertically */
    background-color: #bebece00;

    border-width: 0;
    border-radius: 5px;
    width: 100%;
    height: 100%;

    transition: none;
    transition: transform 0.2s ease;
}

.simulation-user-selected {
    background-color: #bebece43;
}

.simulation-user:hover {
    background-color: #bebece43;
}

.simulation-user-button:active {
    transform: scale(0.95);
}

.simulation-user-icon {
    width: 50px;
    height: 50px;
    margin: 0px 7px;
    border-radius: 50%;
}

.simulation-user-name {
    font-size: 15px;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: #fff;
    font-weight: 600;
    width: 99px;
    text-align: left;
    overflow-wrap: break-word;
}

#simulation-buttons {
    width: fit-content;
    height: 42px;
    z-index: 5;

    grid-area: 1/1;
    margin: 20px;
    justify-self: right;
    align-self: end;
    opacity: 0;
    display: flex;
}

.simulation-button {
    height: 42px;
    width: 42px;
    background-color: #f0f0f000;
    border-radius: 5px;
    transition: none;
    margin-left: 4px;
    display: flex;
    justify-content: center; /* Horizontal centering */
    align-items: center;
    border-radius: 6px;
    border: none;
}

.simulation-button:hover {
    background-color: #f0f0f071;
}

.simulation-button:active {
    background-color: #f0f0f0c0;
}

.simulation-button-image {
    height: 18px;
    width: auto;
    fill: white;
    stroke: white;
    stroke-width: 3px;
}

.hidden-path {
    fill: transparent !important;
    stroke: transparent !important;
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left-panel">
        <h3 style="text-align:center;">Users</h3>
        <table id="usersScroll">
            <tr id="add-row">
                <td onclick="addUser()" class="plus user-boxes">+</td>
            </tr>
        </table>
    </div>

    <!-- CENTER -->
    <div class="center-panel">
        <h1 style="text-align:center;">Windows 11 Lock Screen Simulator</h1>
        <div class="main-div shadowed">
            <!-- main frame -->
            <button onclick="fullscreenMain()" id="fullscreen-main">
                <img id="fullscreen-image" src="https://cdn-icons-png.flaticon.com/512/4785/4785776.png"/>
            </button>
            <div id="simulation-frame" onclick="openLogin()">
                <!-- SIMULATION HERE -->
                <img id="simulation-background-temp" src="https://i.postimg.cc/2yP4VfQh/default-Background.jpg" draggable="false"/>
                <img id="simulation-background" src="https://i.postimg.cc/2yP4VfQh/default-Background.jpg" draggable="false"/>
                <label id="simulation-time">12:00</label>
                <label id="simulation-date">Monday, January 1</label>

                <div id="loginFrame" class="hidden">
                    <img id="simulation-icon" src="https://i.postimg.cc/zGjYSDyy/usericon.png" draggable="false"/>
                    <label id="simulation-name">User</label>
                    <video autoplay muted id="simulation-pin-image" draggable="false">
                        <source src="https://github.com/PrPunk/WEBFILES/raw/refs/heads/main/VidSmall.webm" type="video/webm"/>
                    </video>
                    <label id="simulation-pin-label">Enter Your PIN</label>
                    <div id="simulation-input-container">
                        <input id="simulation-input" type="text" autocomplete="off" spellcheck="false" placeholder="PIN" draggable="false">

                                </svg>
                            </button>
                            <button id="simulation-password-input" class="hidden" onclick="checkPassword()">
                                <svg id="simulation-arrow-image" draggable="false" viewBox="0 0 72 72">
                                    <path d="M38.99 65.99L38.99 65.99Q37.76 65.99 36.88 65.11Q36 64.23 36 63L36 63Q36 61.77 36.88 60.89L36.88 60.89L61.77 36L2.99 36Q1.76 36 0.88 35.12Q0 34.24 0 33.01L0 33.01Q0 32.38 0.23 31.83Q0.46 31.29 0.86 30.88Q1.27 30.48 1.81 30.23Q2.36 29.99 2.99 29.99L2.99 29.99L61.73 29.99L36.88 5.13Q36 4.25 36 2.99L36 2.99Q36 1.76 36.88 0.88Q37.76 0 38.99 0L38.99 0Q40.25 0 41.13 0.88L41.13 0.88L71.02 30.76Q71.51 31.25 71.75 31.78Q72 32.31 72 33.01L72 33.01Q72 33.71 71.74 34.24Q71.47 34.77 70.98 35.26L70.98 35.26L41.13 65.11Q40.25 65.99 38.99 65.99Z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <label id="simulation-forgot">I forgot my PIN</label>

                    <label id="simulation-wrong" class="hidden">The PIN is incorrect. Try again.</label>

                    <img id="simulation-think" class="hidden" src="https://i.postimg.cc/G2WpwMHH/windows-loandig-cargando.gif"/>

                    <button id="simulation-again" class="hidden" onclick="tryAgain()">OK</button>
                </div>

                <table id="simulation-users" class="hidden">
                    <tbody/>
                </table>

                <div id="simulation-buttons" class="hidden">

<script type="text/javascript">
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    let mainFrame = document.getElementById("simulation-frame");

    let backgroundDisplay = document.getElementById("background-display");
    let iconDisplay = document.getElementById("icon-display");
    let usernameInput = document.getElementById("name-input");
    let passwordInput = document.getElementById("input-password");
    let pinInput = document.getElementById("input-pin");
    let pinSlider = document.getElementById("pin-digits");
    let pinCount = document.getElementById("pin-count");
    let outputText = document.getElementById("outputText");
    let internetSelect = document.getElementById("internet-select");

    // ===== CONFIG =====
    const DEFAULT_ICON = "https://i.postimg.cc/1RKpc6Tc/Untitled.png";
    const DEFAULT_BACKGROUND = "https://i.postimg.cc/2yP4VfQh/default-Background.jpg";
    const maskChar = "●";


    var simulationId = 0;
    var onLogin = false;
    var loginCounter = 0;
    var enteredPass = "";
    var maskInput = true;
    var passEntered = false;
    var mousePos = [0,0];
    var internetMode = 3;

    let simulationBackground = document.getElementById("simulation-background");
    let simulationDate = document.getElementById("simulation-date");
    let simulationTime = document.getElementById("simulation-time");
    let simulationLogin = document.getElementById("loginFrame");
    let simulationIcon = document.getElementById("simulation-icon");
    let simulationName = document.getElementById("simulation-name");
    let simulationPinImage = document.getElementById("simulation-pin-image");
    let simulationPinLabel = document.getElementById("simulation-pin-label");
    let simulationInputContainer = document.getElementById("simulation-input-container");
    let simulationInput = document.getElementById("simulation-input");
    let simulationPasswordInput = document.getElementById("simulation-password-input");
    let simulationShowInput = document.getElementById("simulation-show-input");
    let simulationForgot = document.getElementById("simulation-forgot");
    let simulationHover = document.getElementById("simulation-hover");
    let simulationWrong = document.getElementById("simulation-wrong");
    let simulationAgain = document.getElementById("simulation-again");
    let simulationThink = document.getElementById("simulation-think");
    let simulationUsers = document.getElementById("simulation-users");
    let simulationBackgroundTemp = document.getElementById("simulation-background-temp");
    let simulationPowerButton = document.getElementById("simulation-power-button");
    let simulationAccessButton = document.getElementById("simulation-accessability-button");
    let simulationInternetButton = document.getElementById("simulation-internet-button");
    let simulationInternetBehind = document.getElementById("simulation-internet-behind");
    let simulationButtons = document.getElementById("simulation-buttons");


    internetSelect.addEventListener("change", () => {
      const value = internetSelect.value;

      selectInternetPath(value);
    });

    function selectInternetPath(mode) {
        internetMode = mode;
        for (let i = 0; i < 5; i++) {
            let path = document.getElementById("simulation-internet-" + i);
            path.classList.add("hidden-path");
        }
        let path = document.getElementById("simulation-internet-" + internetMode);
        path.classList.remove("hidden-path");
        if (internetMode > 0 && internetMode < 3) {
            simulationInternetBehind.classList.remove("hidden-path");
        } else {
            simulationInternetBehind.classList.add("hidden-path");
        }
        saveInternetMode(internetMode);
    }


    function selectSimulationRow(index) {
        let parent = simulationUsers.querySelector("tbody")

        for (let row of parent.children) {
            let cell = row.querySelector("td");
            cell.classList.remove("simulation-user-selected");
        }

        let selRow = document.getElementById(`simulation-user-${index}`);

        selRow.classList.add("simulation-user-selected");

    }

    function loadSimulationUsers() {
        let parent = simulationUsers.querySelector("tbody")

        parent.replaceChildren();

        for (let i in users) {
            let user = users[i];
            let row = createSimulationUser(user, i);
            parent.appendChild(row);
        }
        selectSimulationRow(simulationId);

        if (users.length > 1 && onLogin) {
            simulationUsers.classList.remove("hidden");
        } else {
            simulationUsers.classList.add("hidden");
        }
    }

    function createSimulationUser(user, index) {
        const tr = document.createElement("tr");
        var image = user.icon;
        if (image == DEFAULT_ICON) image = "https://i.postimg.cc/mDx8FN1v/guest.png";

        tr.innerHTML = `
            <td class="simulation-user" id="simulation-user-${index}">
                <button class="simulation-user-button" onclick="updateSimulationUser(${index})">
                    <img class="simulation-user-icon" src="${image}">
                    <label class="simulation-user-name">${user.name}</label>
                </button>
            </td>
        `;

        return tr;
    }


    function tryAgain() {
        if (!passEntered) return;
        passEntered = false;
        simulationWrong.classList.add("hidden");
        simulationAgain.classList.add("hidden");

        if (users[simulationId].method !== 0) {
            simulationPinImage.classList.remove("hidden");
            simulationPinLabel.classList.remove("hidden");
            playPinAnimation();
        }

        
        simulationInputContainer.classList.remove("hidden");
        simulationForgot.classList.remove("hidden");
        simulationInput.focus();
    }

    function openLogin() {
        simulationAgain.classList.add("force-active");
        simulationInput.classList.add("force-active");
        if (onLogin) return;
        onLogin = true;

        simulationDate.style.marginTop = "150px";
        simulationDate.style.opacity = "0";

        simulationTime.style.marginTop = "10px";
        simulationTime.style.opacity = "0";

        simulationLogin.classList.remove("hidden");
        simulationButtons.classList.remove("hidden");
        if (users.length > 1) {
            simulationUsers.classList.remove("hidden");
        }

        setTimeout(function() {
            simulationBackground.style.filter = "blur(8px)";
            simulationBackground.style.transform = "scale(1.02)";
            simulationBackgroundTemp.style.filter = "blur(8px)";
            simulationBackgroundTemp.style.transform = "scale(1.02)";

            simulationLogin.style.opacity = 1;
            simulationButtons.style.opacity = 1;
            simulationUsers.style.opacity = 1;
        }, 50);

        playPinAnimation();
        setCloseure();

    }

    function closeLogin() {
        if (!onLogin) return;
        onLogin = false;

        simulationDate.style.transition = "none";
        simulationDate.style.marginTop = "300px";
        simulationDate.style.opacity = "1";

        simulationTime.style.transition = "none";
        simulationTime.style.marginTop = "160px";
        simulationTime.style.opacity = "1";

        simulationBackground.style.filter = "blur(0px)";
        simulationBackground.style.transform = "scale(1)";
        simulationBackgroundTemp.style.filter = "blur(0px)";
        simulationBackgroundTemp.style.transform = "scale(1)";

        simulationLogin.style.transition = "none";
        simulationLogin.style.opacity = 0;
        simulationButtons.style.opacity = 0;
        simulationUsers.style.opacity = 0;
        simulationLogin.classList.add("hidden");
        simulationButtons.classList.add("hidden");
        simulationUsers.classList.add("hidden");

        simulationDate.style.transition = "all 0.15s ease";
        simulationTime.style.transition = "all 0.15s ease";

        simulationLogin.style.transition = "all 0.25s ease";
        tryAgain();
    }

    function checkPassword() {
        if (passEntered) return;
        passEntered = true;
        simulationInputContainer.classList.add("hidden");
        simulationForgot.classList.add("hidden");



        simulationThink.classList.remove("hidden");
        startFromBeginning(simulationThink);

        setTimeout(function () {
            simulationPinLabel.textContent = "Welcome";
            simulationInput.value = "";
        }, 50);
        



        if (users[simulationId].method > 0 && enteredPass.length == 0) {
            simulationWrong.textContent = "Provide a PIN.";
        } else if (users[simulationId].method === 0) {
            simulationWrong.textContent = "The password is incorrect. Try again.";
        } else {
            simulationWrong.textContent = "The PIN is incorrect. Try again.";
        }
        if (enteredPass != "") outputText.textContent += "\n" + enteredPass;
        enteredPass = "";
        simulationShowInput.classList.add("hidden")
        setTimeout(function () {
            simulationThink.classList.add("hidden");
            simulationPinImage.classList.add("hidden");
            simulationPinLabel.classList.add("hidden");
            simulationWrong.classList.remove("hidden");
            simulationAgain.classList.remove("hidden");
            simulationPinLabel.textContent = "Enter Your PIN";
            simulationWrong.focus();
        }, 100);
        
    }

    async function setCloseure() {
        while(onLogin) {

            loginCounter += 1;

            if (loginCounter > 30) {
                closeLogin();
                loginCounter = 0;
                break;
            }

            await new Promise(resolve => setTimeout(resolve, 1000));
        }
    }

    function updateSimulationUser(index) {
        if (index !== undefined) {
            let user = users[index];
            let oldBackground = simulationBackground.src;

            // Only animate if the background is actually different
            if (oldBackground !== user.background) {
                
                setTimeout(function () {
                    // 1. Set the background behind to the CURRENT image
                    simulationBackgroundTemp.src = oldBackground;
                    
                    // 2. Hide the main background instantly and swap its source
                    simulationBackground.style.transition = "none";
                    simulationBackground.style.opacity = "0";
                    simulationBackground.src = user.background;

                    // 3. Force a reflow so the browser registers the opacity 0
                    simulationBackground.offsetHeight; 

                    // 4. Fade the main background back in over 1 second
                    simulationBackground.style.transition = "opacity 1.75s cubic-bezier(0.3, 0, 0.7, 1), filter 0.25s ease, transform 0.25s ease";
                    simulationBackground.style.opacity = "1";
                },300);
            }

            simulationId = index;
            selectSimulationRow(index);
        }

        // Continue with the rest of your existing logic
        let user = users[simulationId];
        simulationIcon.src = user.icon;
        simulationName.textContent = user.name;

        let method = user.method;
        if (!method) {
            simulationPinImage.classList.add("hidden"); 
            simulationPinLabel.classList.add("hidden");
            simulationInput.placeholder = "Password";
            simulationForgot.textContent = "I forgot my password";
            simulationPasswordInput.classList.remove("hidden");
        } else {
            simulationPinImage.classList.remove("hidden");
            simulationPinLabel.classList.remove("hidden"); 
            simulationInput.placeholder = "PIN";
            simulationForgot.textContent = "I forgot my PIN";
            simulationPasswordInput.classList.add("hidden");
            playPinAnimation();
        }
    }

    document.addEventListener("mousemove", (e) => {
        mousePos = [e.clientX, e.clientY];
    });

    usernameInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            updateName();
        }
    });

    // When user presses the button
    simulationShowInput.addEventListener("mousedown", () => {
        simulationInput.classList.add("force-active");
        maskInput = false;
        updateInputDisplay();
    });

    // When user releases the button or moves mouse away
    simulationShowInput.addEventListener("mouseup", () => {
        simulationInput.focus();
        simulationInput.classList.remove("force-active");
        maskInput = true;
        updateInputDisplay();
    });

    simulationShowInput.addEventListener("mouseleave", () => {
        simulationInput.focus();
        simulationInput.classList.remove("force-active");
        maskInput = true;
        updateInputDisplay();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && passEntered && e.target.id != "simulation-input") {
        simulationAgain.click();
      }
    });

    function startFromBeginning(gif) {
      gif.src = gif.src;
    }


    function updateInputDisplay() {
        if (maskInput) {
            simulationInput.value = maskChar.repeat(enteredPass.length);
        } else {
            simulationInput.value = enteredPass;
        }

        if (enteredPass.length > 0 ) {
            simulationShowInput.classList.remove("hidden");
        } else {
            simulationShowInput.classList.add("hidden");
        }
    }

    simulationInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            checkPassword();
        }
    });

    simulationInput.addEventListener("input", (e) => {
        loginCounter = 0;
        const raw = e.target.value;

        const lastChar = raw.slice(-1);

        if (raw.length < enteredPass.length) {
            // backspace or delete
            enteredPass = enteredPass.slice(0, raw.length);
        } else if (raw.length > enteredPass.length) {
            // new character added
            if (users[simulationId].method === 0 || /^\d$/.test(lastChar)) {
                enteredPass += lastChar;
                if (enteredPass.length >= users[simulationId].method && users[simulationId].method !== 0) {
                    updateInputDisplay();
                    checkPassword();
                    return;
                }
            }
        }

        updateInputDisplay();
    });

    function uploadBackground() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";

        input.onchange = function (event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                const imageSrc = e.target.result; // THIS is your usable string

                // Example usage:
                users[currentIndex].background = imageSrc;
                backgroundDisplay.src = imageSrc;
                saveUsers(users);
                updateSimulationUser();
            };

            reader.readAsDataURL(file);
        };

        input.click();
    }

    function uploadIcon() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";

        input.onchange = function (event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                const imageSrc = e.target.result; // THIS is your usable string

                // Example usage:
                users[currentIndex].icon = imageSrc;
                iconDisplay.src = imageSrc;
                saveUsers(users);
                let image = document.getElementById(`user-icon-${currentIndex}`);
                image.src = imageSrc;
                updateSimulationUser();
            };

            reader.readAsDataURL(file);
        };

        input.click();
    }

    function updateName() {
        let name = usernameInput.value;
        users[currentIndex].name = name;
        saveUsers(users);

        let label = document.getElementById(`user-name-${currentIndex}`);
        label.textContent = name;
        updateSimulationUser();
        loadSimulationUsers();
    }

    function updateMethod() {
        var method = 0;

        if (passwordInput.checked) {
            document.querySelectorAll(".pin-slide").forEach(el => {
                el.classList.add("hidden");
            });
            pinSlider.value = 6;
        } else {
            document.querySelectorAll(".pin-slide").forEach(el => {
                el.classList.remove("hidden");
            });
            method = pinSlider.value;
            pinCount.textContent = "Pin Digits: " + pinSlider.value;
        }

        users[currentIndex].method = method;
        saveUsers(users);
        updateSimulationUser();
        loadSimulationUsers();
    }







    // ===== STORAGE =====
    function saveUsers(users) {
        localStorage.setItem("users", JSON.stringify(users));
    }

    function loadUsers() {
        return JSON.parse(localStorage.getItem("users")) || [];
    }

    function saveInternetMode(mode) {
        localStorage.setItem("internetMode", mode.toString());
    }

    function loadInternetMode() {
        const value = localStorage.getItem("internetMode");
        return value !== null ? parseInt(value, 10) : 3; // default = 0
    }

    // ===== STATE =====
    let users = loadUsers();
    var currentIndex = 0

    // ===== CREATE USER =====
    function createUser() {
        const newUser = {
            name: "User",
            icon: DEFAULT_ICON,
            background: DEFAULT_BACKGROUND,
            method: 6
        };

        users.push(newUser);
        saveUsers(users);
        return newUser;
    }

    // ===== INIT =====
    function initUsers() {
        users = loadUsers();

        if (users.length === 0) {
            createUser();
        }
    }

    // ===== RENDER =====
    function renderUsers() {
        const table = document.getElementById("usersScroll");

        // remove all except add row
        table.querySelectorAll("tr:not(#add-row)").forEach(r => r.remove());

        // Pass the index (i) to the insert function
        users.forEach((user, i) => {
            addUserAsSecondToLast(user, i);
        });
        selectBox(currentIndex);
    }

    // ===== INSERT =====
    function addUserAsSecondToLast(user, index) {
        const addRow = document.getElementById("add-row");
        const parent = addRow.parentElement; 
        const newRow = createUserRow(user, index); // Pass index here

        parent.insertBefore(newRow, addRow);
    }

    // ===== DOM ROW =====
    function createUserRow(user, index) {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td id="user-box-${index}" class="user-boxes">
                <button class="cell-button" onclick="showUser(${index})">
                    <div class="cell-content">
                        <img id="user-icon-${index}" class="circle-img" src="${user.icon}">
                        <span id="user-name-${index}" class="username-display">${user.name}</span>
                        <span class="min-button" onclick="event.stopPropagation(); removeUser(${index})">
                            <img width="30px" height="30px" src="https://img.icons8.com/ios7/600/FA5252/trash.png">
                        </span>
                    </div>
                </button>
            </td>
        `;

        return tr;
    }

    function showUser(index) {
        currentIndex = index;
        var user = users[index];

        usernameInput.value = user.name;
        passwordInput.checked = (user.method == 0);
        pinInput.checked = (user.method != 0);

        if (passwordInput.checked) {
            document.querySelectorAll(".pin-slide").forEach(el => {
                el.classList.add("hidden");
            });
            pinSlider.value = 6;
        } else {
            document.querySelectorAll(".pin-slide").forEach(el => {
                el.classList.remove("hidden");
            });
            pinSlider.value = user.method;
            pinCount.textContent = "Pin Digits: " + pinSlider.value;
        }

        backgroundDisplay.src = user.background;
        iconDisplay.src = user.icon;

        renderUsers();

    }

    function selectBox(index) {
        let box = document.getElementById(`user-box-${index}`);
        box.classList.add("selectedBox");
    }


    // ===== DELETE USER =====
    function removeUser(index) {
        if (currentIndex == index && currentIndex > 0) {
            showUser(currentIndex - 1);
        } else if (currentIndex == index && users.length > 1) {
            showUser(currentIndex);
        } else if (currentIndex == index) {
            return;
        }

        // Remove 1 element at the specified index
        users.splice(index, 1);
        
        saveUsers(users);
        
        // We MUST re-render everything so the remaining 
        // buttons get updated with their new indices
        renderUsers();
        loadSimulationUsers();
    }

    // ===== ADD USER =====
    function addUser() {
        createUser();
        renderUsers();
        loadSimulationUsers();
    }

    // ===== FULLSCREEN =====
    function fullscreenMain() {
        mainFrame.requestFullscreen();
    }

    function runOnMinuteChange(callback) {
        function schedule() {
            const now = new Date();

            // ms until next minute starts
            const msUntilNextMinute =
                (60 - now.getSeconds()) * 1000 - now.getMilliseconds();

            setTimeout(() => {
                callback();   // run at minute change
                schedule();   // schedule next one
            }, msUntilNextMinute);
        }

        schedule();
    }

    function updateMinute() {
        simulationTime.textContent = new Date().toLocaleTimeString("en-US", {
            hour: "numeric",
            minute: "2-digit"
        }).replace(" AM", "").replace(" PM", "");
    }

    // Make sure it doesn't loop
    simulationPinImage.loop = false;

    // Optional: prevent user controls if you want it "API controlled"
    simulationPinImage.controls = false;

    function playPinAnimation() {
      simulationPinImage.currentTime = 0;   // restart from beginning
      simulationPinImage.play();
    }

    function setupHoverText(element, hoverText, delay = 1000) {
        let timer = null;
        let active = false;

        function show() {
            simulationHover.style.left = mousePos[0] + "px";
            simulationHover.style.top = (mousePos[1] - 55) + "px";
            simulationHover.textContent = hoverText;
            simulationHover.classList.remove("hidden");
        }

        function hide() {
            simulationHover.classList.add("hidden");
        }

        function reset() {
            clearTimeout(timer);
            timer = null;
            active = false;
            hide();
        }

        element.addEventListener("mouseenter", () => {
            active = true;

            timer = setTimeout(() => {
                if (active) show();
            }, delay);
        });

        element.addEventListener("mouseleave", () => {
            reset();
        });
    }

    // When video ends, freeze on last frame
    simulationPinImage.addEventListener("ended", () => {
      simulationPinImage.pause();
      
      // Force last frame (important for some browsers)
      simulationPinImage.currentTime = simulationPinImage.duration;
    });

    // ===== START =====
    initUsers();
    renderUsers();
    showUser(0);
    updateSimulationUser();
    updateMinute();
    runOnMinuteChange(updateMinute);
    setupHoverText(simulationPasswordInput, "Submit");
    setupHoverText(simulationPowerButton, "Power");
    setupHoverText(simulationAccessButton, "Accessibility");
    setupHoverText(simulationInternetButton, "Internet");
    loadSimulationUsers();

    internetMode = loadInternetMode();
    selectInternetPath(internetMode);
    internetSelect.value = internetMode;

    simulationDate.textContent = new Date().toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric"
    });

    
</script>

</body>
</html>
